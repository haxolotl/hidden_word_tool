<!DOCTYPE html>
<html>
<head>
    <title>Searching...</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
        }
        .loading {
            text-align: center;
            padding: 60px 20px;
        }
        .loading-spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #0066cc;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .loading-text {
            color: #666;
            font-size: 16px;
        }
    </style>
</head>
<body>
    <div class="loading">
        <div class="loading-spinner"></div>
        <div class="loading-text">
            Searching for "{{ word }}"...
        </div>
    </div>
    
    <script>
        // Detect if this is reversed hidden search by checking the URL path
        const currentPath = window.location.pathname;
        const isReversedHidden = currentPath.includes('reversed-hidden');
        
        // Build search URL
        const params = new URLSearchParams(window.location.search);
        const searchPath = isReversedHidden ? '/reversed-hidden/search' : '/hidden/search';
        const searchUrl = searchPath + '?' + params.toString();
        
        // Fetch actual results
        fetch(searchUrl)
            .then(response => response.text())
            .then(html => {
                document.open();
                document.write(html);
                document.close();
            })
            .catch(error => {
                document.body.innerHTML = '<div style="color: red; padding: 20px;">Error loading results: ' + error + '</div>';
            });
    </script>
</body>
</html>
